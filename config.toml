# =============================================================
# yomiage 設定ファイル
# =============================================================
# このファイルを編集して保存後、yomiage を再起動すると反映されます。
# # で始まる行はコメント（無視されます）。
#
# このファイルが存在しない場合、起動時に自動でデフォルト設定で作成されます。
# =============================================================

[summary]
# -------------------------------------------------------------
# 要約読み上げ機能（Ctrl+Alt+S で呼び出す）
# -------------------------------------------------------------

# 要約モードを有効にするか (true / false)
# false の場合、Ctrl+Alt+S を押しても何も起きません。
enabled = true

# 使用する AI プロバイダ
#   "openai"    - OpenAI ChatGPT (推奨・最安・最速)
#   "anthropic" - Anthropic Claude
#   "gemini"    - Google Gemini (無料枠あり)
#
# それぞれ環境変数からAPIキーを読み込みます:
#   openai    → OPENAI_API_KEY
#   anthropic → ANTHROPIC_API_KEY
#   gemini    → GEMINI_API_KEY
provider = "openai"

# モデル名（プロバイダごとに変わります）
# OpenAI:    "gpt-4o-mini" (推奨/安価) / "gpt-4o" (高品質/高い)
# Anthropic: "claude-haiku-4-5" (安価) / "claude-sonnet-4-5" (高品質)
# Gemini:    "gemini-2.0-flash" (無料枠) / "gemini-2.5-pro" (高品質)
model = "gpt-4o-mini"

# 要約の長さ
#   "short"  - 短く（元の30%程度）
#   "medium" - 中程度（50%程度）★推奨
#   "long"   - 詳しめ（70%程度）
#   "bullet" - 要点を箇条書きで列挙
length = "medium"

# 追加の指示（オプション・空文字でもOK）
# 要約のトーンや細かい指示を文章で書けます。
# 例: "話し言葉で簡潔に" / "ビジネス調で" / "中学生にも分かるように"
extra_instruction = "ビジネス調で"

# API エラー / API キー未設定時の動作
#   "fallback" - 元のテキストをそのまま読み上げる ★推奨
#   "skip"     - 何もしない（停止）
on_error = "fallback"

# API のタイムアウト秒数
timeout_s = 30

# 要約処理チャンクの最大文字数
# 長文を 1 回で要約させると AI が極端に短くまとめがちなので、
# このサイズで区切って AI に渡し、各部分の要約を連結する。
#   小さくする (例: 800)  → 詳細が残る・APIコールが増える
#   大きくする (例: 3000) → コール少ないが圧縮されすぎる
#   推奨: 1500
chunk_chars = 1500
